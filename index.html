<div class="search-wrap" id="searchSection">
  <svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input class="search-input" id="searchInput" type="text" placeholder="" aria-label="성취기준 검색">

<button class="fab" id="fab" onclick="togglePanel()" aria-expanded="false" aria-controls="collectPanel" aria-label="담은 성취기준 패널 열기/닫기">
  📋 담은 항목 <span class="fab-cnt" id="fabCnt" aria-live="polite" aria-atomic="true">0</span>
</button>

<div class="collect-panel" id="collectPanel" aria-hidden="true">
  <div class="panel-header" onclick="togglePanel()" role="button" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();togglePanel()}">
    <div class="panel-title">📋 담은 성취기준 <span class="panel-cnt-badge" id="panelCnt">0</span></div>
    <div class="panel-actions" onclick="event.stopPropagation()">
      <button class="pbtn sec" onclick="clearCollect()">전체 삭제</button>
      <button class="pbtn pri" id="copyAllBtn" onclick="copyAll()">전체 복사</button>
      <button class="pbtn sec" id="downloadCollectedBtn" onclick="downloadCollected()">담은 항목 저장 (.txt)</button>
      <button class="pbtn sec" onclick="togglePanel()">닫기 ▼</button>
    </div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>


<!-- 수업계획 성취기준 연결 모달 -->
<div id="lessonModal" class="eval-modal-overlay" style="display:none" onclick="if(event.target===this)lpCloseModal()">
  <div class="eval-modal" role="dialog" aria-modal="true" aria-labelledby="lpModalTitle">
    <div class="eval-modal-hd">
      <span class="eval-modal-title" id="lpModalTitle">성취기준 연결</span>
      <select id="lpModalSubjSel" class="eval-select" style="font-size:12px;flex:1;max-width:220px" onchange="lpModalChangeSubject(this.value)" aria-label="과목 선택"></select>
      <button class="cmp-close-btn" onclick="lpCloseModal()" aria-label="닫기">✕</button>
    </div>
    <div class="eval-modal-body" id="lpModalBody"></div>
    <div class="eval-modal-ft">
      <span class="eval-modal-sel-count" id="lpModalSelCount">0개 선택됨</span>
      <div style="display:flex;gap:8px">
        <button class="pbtn sec" onclick="lpCloseModal()">취소</button>
        <button class="pbtn pri" onclick="lpConfirmModal()">확인</button>
      </div>
    </div>
  </div>
</div>
