<!-- 성취기준 선택 공용 모달 (stdpicker) — 수업계획·평가·루브릭·정기시험 공유 -->
<div id="stdPickerModal" class="eval-modal-overlay" style="display:none">
  <div class="eval-modal" role="dialog" aria-modal="true" aria-labelledby="stdPickerTitle">
    <div class="eval-modal-hd">
      <span class="eval-modal-title" id="stdPickerTitle">성취기준 선택</span>
      <select id="stdPickerSubjSel" class="eval-select" style="font-size:13px;flex:1;max-width:220px" aria-label="과목 선택"></select>
      <button class="cmp-close-btn" id="stdPickerCloseX" aria-label="닫기">✕</button>
    </div>
    <div class="std-picker-hint" id="stdPickerHint" style="display:none"></div>
    <div class="eval-modal-body" id="stdPickerModalBody"></div>
    <div class="eval-modal-ft">
      <span class="eval-modal-sel-count" id="stdPickerSelCount">0개 선택됨</span>
      <div style="display:flex;gap:8px">
        <button class="pbtn sec" id="stdPickerCancelBtn">취소</button>
        <button class="pbtn pri" id="stdPickerConfirmBtn">확인</button>
      </div>
    </div>
  </div>
</div>

<!-- 평가계획 표 미리보기 모달 -->

      <button class="pbtn sec" id="evalCopyBtn">클립보드 복사</button>
      <button class="pbtn pri" id="evalPreviewCloseBtn">닫기</button>
